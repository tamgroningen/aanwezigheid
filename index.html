<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAM Aanwezigheid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="#" class="nav-brand">TAM Aanwezigheid</a>
        <div class="nav-right" id="nav-auth"></div>
    </nav>
    <main id="app"></main>

<script>
const SYNC_URL = 'https://aanwezigheid-sync.tam-floris.workers.dev';
let DATA = null;
let ADMIN_DATA = null;
let TRAINER_DATA = null;

// --- Auth ---
function getAuth() { const r = localStorage.getItem('aanwezigheid_auth'); return r ? JSON.parse(r) : null; }
function setAuth(a) { localStorage.setItem('aanwezigheid_auth', JSON.stringify(a)); }
function clearAuth() { localStorage.removeItem('aanwezigheid_auth'); ADMIN_DATA = null; TRAINER_DATA = null; }
function isAdmin() { return getAuth()?.role === 'admin'; }
function getTrainerId() { return getAuth()?.role === 'trainer' ? getAuth().trainer_id : null; }

// --- API ---
async function fetchData() { const r = await fetch(SYNC_URL + '/data'); DATA = await r.json(); return DATA; }

async function apiLogin(code) {
    const r = await fetch(SYNC_URL + '/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code }),
    });
    return r.json();
}

async function apiPost(path, body) {
    const auth = getAuth();
    const r = await fetch(SYNC_URL + path, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code: auth.code, ...body }),
    });
    return r.json();
}

// --- Helpers ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function pctClass(pct) {
    if (pct < 50) return 'pct-red';
    if (pct < 75) return 'pct-yellow';
    return 'pct-green';
}

function barColor(pct) {
    if (pct < 50) return 'var(--red)';
    if (pct < 75) return 'var(--yellow)';
    return 'var(--green)';
}

function formatDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}

function calcGroupStats(group) {
    const activeDates = group.dates.filter(d => !(group.cancelled || []).includes(d));
    const totalSessions = activeDates.length;
    const playerStats = group.players.map(player => {
        let count = 0;
        for (const d of activeDates) {
            if ((group.attendance?.[d] || []).includes(player)) count++;
        }
        const pct = totalSessions > 0 ? Math.round((count / totalSessions) * 100) : 0;
        return { player, count, totalSessions, pct };
    });
    const avgAttendance = totalSessions > 0 && group.players.length > 0
        ? Math.round(playerStats.reduce((s, p) => s + p.pct, 0) / group.players.length)
        : 0;
    return { playerStats, totalSessions, avgAttendance };
}

// --- Rendering ---
function renderNav() {
    const el = document.getElementById('nav-auth');
    const auth = getAuth();
    if (isAdmin()) {
        el.innerHTML = `<span class="nav-role">Trainingsleider</span>
            <a href="#admin" class="nav-link">Beheer</a>
            <a href="#" class="nav-link" id="logout-btn">Uitloggen</a>`;
    } else if (auth?.role === 'trainer') {
        el.innerHTML = `<span class="nav-role">${esc(auth.trainer_name)}</span>
            <a href="#" class="nav-link" id="logout-btn">Uitloggen</a>`;
    } else {
        el.innerHTML = `<a href="#login" class="nav-link">Inloggen</a>`;
    }
    document.getElementById('logout-btn')?.addEventListener('click', e => { e.preventDefault(); clearAuth(); navigate(''); });
}

function renderLogin() {
    return `<div class="login-center"><div class="login-card">
        <h1>TAM Aanwezigheid</h1>
        <p class="login-hint">Voer je trainerscode of admincode in</p>
        <form id="login-form">
            <input type="password" id="login-code" placeholder="Code" autofocus required>
            <p class="error" id="login-error" style="display:none"></p>
            <button type="submit">Inloggen</button>
        </form>
        <a href="#" class="login-skip">Alleen bekijken</a>
    </div></div>`;
}

function renderHome() {
    if (!DATA) return '<p>Laden...</p>';
    const src = isAdmin() && ADMIN_DATA ? ADMIN_DATA : DATA;

    if (getTrainerId()) return renderTrainerHome();

    let html = '<h1>Overzicht Aanwezigheid</h1>';

    if (src.trainers.length === 0) {
        html += '<p class="empty">Nog geen trainers toegevoegd.</p>';
        if (isAdmin()) html += '<p><a href="#admin">Ga naar beheer</a> om trainers toe te voegen.</p>';
        return html;
    }

    for (const trainer of src.trainers) {
        html += `<div class="card"><h3>${esc(trainer.name)}</h3>`;
        if (isAdmin() && trainer.code) html += `<span class="trainer-code">Code: ${esc(trainer.code)}</span>`;

        if (trainer.groups.length === 0) {
            html += '<p class="empty">Geen groepen</p>';
        } else {
            for (const group of trainer.groups) {
                const stats = calcGroupStats(group);
                html += `<div style="margin:8px 0">
                    <strong>${esc(group.name)}</strong>
                    <span style="margin-left:8px;font-size:0.85rem;color:var(--muted)">${group.players.length} spelers, ${stats.totalSessions} lessen</span>
                    <div class="overview-bar"><div class="overview-bar-fill" style="width:${stats.avgAttendance}%;background:${barColor(stats.avgAttendance)}"></div></div>
                    <span class="pct ${pctClass(stats.avgAttendance)}" style="font-size:0.8rem">${stats.avgAttendance}% gem. aanwezigheid</span>
                </div>`;
            }
        }
        html += '</div>';
    }

    html += '<h2><a href="#overview" style="color:var(--blue)">Volledig overzicht per speler &rarr;</a></h2>';
    return html;
}

function renderTrainerHome() {
    const trainerId = getTrainerId();
    const src = TRAINER_DATA || DATA?.trainers?.find(t => t.id === trainerId);
    if (!src) return '<p>Trainer niet gevonden.</p>';

    const trainer = src.groups ? src : { groups: [] };
    let html = `<h1>Mijn groepen</h1>`;

    if (trainer.groups.length === 0) {
        return html + '<p class="empty">Nog geen groepen toegewezen. Neem contact op met de trainingsleider.</p>';
    }

    for (const group of trainer.groups) {
        const stats = calcGroupStats(group);
        html += `<a href="#group/${trainerId}/${group.id}" class="card card-link">
            <h3>${esc(group.name)}</h3>
            <p>${group.players.length} spelers, ${stats.totalSessions} lessen, ${stats.avgAttendance}% gem. aanwezigheid</p>
            <div class="overview-bar"><div class="overview-bar-fill" style="width:${stats.avgAttendance}%;background:${barColor(stats.avgAttendance)}"></div></div>
        </a>`;
    }
    return html;
}

function renderOverview() {
    if (!DATA) return '<p>Laden...</p>';
    const src = isAdmin() && ADMIN_DATA ? ADMIN_DATA : DATA;
    let html = '<a href="#" class="back-link">&larr; Terug</a><h1>Volledig Overzicht</h1>';

    for (const trainer of src.trainers) {
        for (const group of trainer.groups) {
            const stats = calcGroupStats(group);
            html += `<div class="overview-group">
                <h3>${esc(group.name)}</h3>
                <div class="trainer-name">Trainer: ${esc(trainer.name)}</div>
                <div class="table-wrap"><table class="data">
                    <thead><tr><th>Speler</th><th>Aanwezig</th><th>Totaal</th><th>Percentage</th></tr></thead>
                    <tbody>`;
            for (const ps of stats.playerStats) {
                html += `<tr>
                    <td>${esc(ps.player)}</td>
                    <td class="num">${ps.count}</td>
                    <td class="num">${ps.totalSessions}</td>
                    <td class="num ${pctClass(ps.pct)}">${ps.pct}%</td>
                </tr>`;
            }
            html += '</tbody></table></div></div>';
        }
    }
    return html;
}

function renderGroup(trainerId, groupId) {
    let trainer, group;
    if (isAdmin() && ADMIN_DATA) {
        trainer = ADMIN_DATA.trainers.find(t => t.id === trainerId);
    } else if (TRAINER_DATA && TRAINER_DATA.id === trainerId) {
        trainer = TRAINER_DATA;
    } else {
        trainer = DATA?.trainers?.find(t => t.id === trainerId);
    }
    if (!trainer) return '<p>Trainer niet gevonden.</p>';
    group = (trainer.groups || []).find(g => g.id === groupId);
    if (!group) return '<p>Groep niet gevonden.</p>';

    const canEdit = isAdmin() || getTrainerId() === trainerId;
    const backHash = getTrainerId() ? '#' : `#trainer/${trainerId}`;

    let html = `<a href="${backHash}" class="back-link">&larr; Terug</a>
        <h1>${esc(group.name)}<span class="save-status" id="save-status"></span></h1>`;

    if (group.dates.length === 0) {
        html += '<p class="empty">Nog geen lesdagen ingesteld.</p>';
        return html;
    }
    if (group.players.length === 0) {
        html += '<p class="empty">Nog geen spelers in deze groep.</p>';
        return html;
    }

    const cancelled = group.cancelled || [];
    const stats = calcGroupStats(group);

    html += '<div class="att-grid"><table><thead><tr><th class="player-name">Speler</th>';
    for (const d of group.dates) {
        const isCancelled = cancelled.includes(d);
        html += `<th class="${isCancelled ? 'cancelled' : ''}">${formatDate(d)}</th>`;
    }
    html += '<th>Totaal</th><th>%</th></tr></thead><tbody>';

    for (const ps of stats.playerStats) {
        html += `<tr><td class="player-name">${esc(ps.player)}</td>`;
        for (const d of group.dates) {
            const isCancelled = cancelled.includes(d);
            const present = (group.attendance?.[d] || []).includes(ps.player);
            if (isCancelled) {
                html += '<td class="cancelled"></td>';
            } else if (canEdit) {
                html += `<td><input type="checkbox" data-player="${esc(ps.player)}" data-date="${d}" ${present ? 'checked' : ''}></td>`;
            } else {
                html += `<td class="num">${present ? 'x' : ''}</td>`;
            }
        }
        html += `<td class="num total">${ps.count}</td>`;
        html += `<td class="num pct ${pctClass(ps.pct)}">${ps.pct}%</td></tr>`;
    }

    // Totals row
    html += '<tr style="font-weight:700"><td>Totaal</td>';
    for (const d of group.dates) {
        const isCancelled = cancelled.includes(d);
        if (isCancelled) {
            html += '<td class="cancelled"></td>';
        } else {
            const count = (group.attendance?.[d] || []).length;
            html += `<td class="num">${count}</td>`;
        }
    }
    html += '<td></td><td></td></tr>';

    html += '</tbody></table></div>';
    return html;
}

function renderAdmin() {
    if (!isAdmin() || !ADMIN_DATA) return '<p>Geen toegang.</p>';

    let html = '<h1>Beheer</h1>';

    // Add trainer form
    html += `<h2>Trainers</h2>
        <form id="add-trainer-form" class="form-row" style="margin-bottom:16px">
            <input type="text" name="name" placeholder="Naam nieuwe trainer" required>
            <button type="submit">Toevoegen</button>
        </form>`;

    for (const trainer of ADMIN_DATA.trainers) {
        html += `<div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                <div>
                    <h3 style="display:inline">${esc(trainer.name)}</h3>
                    <span class="trainer-code" style="margin-left:8px">Code: ${esc(trainer.code)}</span>
                </div>
                <button class="btn-sm btn-danger delete-trainer-btn" data-trainer-id="${trainer.id}">Verwijderen</button>
            </div>`;

        // Groups
        html += '<div style="margin-top:12px">';
        for (const group of trainer.groups) {
            html += `<div style="padding:8px 0;border-top:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                    <a href="#group/${trainer.id}/${group.id}" style="color:var(--blue);font-weight:600">${esc(group.name)}</a>
                    <button class="btn-sm btn-danger delete-group-btn" data-trainer-id="${trainer.id}" data-group-id="${group.id}">X</button>
                </div>
                <div style="font-size:0.85rem;color:var(--muted)">${group.players.length} spelers, ${group.dates.length} lesdagen</div>
                <details style="margin-top:4px">
                    <summary style="cursor:pointer;font-size:0.85rem;color:var(--blue)">Spelers bewerken</summary>
                    <form class="edit-players-form" data-trainer-id="${trainer.id}" data-group-id="${group.id}" style="margin-top:4px">
                        <div class="form-row">
                            <textarea name="players" placeholder="Eén speler per regel">${esc(group.players.join('\n'))}</textarea>
                        </div>
                        <button type="submit" class="btn-sm">Opslaan</button>
                    </form>
                </details>
                <details style="margin-top:4px">
                    <summary style="cursor:pointer;font-size:0.85rem;color:var(--blue)">Lesdagen bewerken</summary>
                    <form class="edit-dates-form" data-trainer-id="${trainer.id}" data-group-id="${group.id}" style="margin-top:4px">
                        <div class="form-row">
                            <textarea name="dates" placeholder="Eén datum per regel (YYYY-MM-DD)">${esc(group.dates.join('\n'))}</textarea>
                        </div>
                        <div class="form-row">
                            <textarea name="cancelled" placeholder="Vervallen datums (YYYY-MM-DD)">${esc((group.cancelled || []).join('\n'))}</textarea>
                        </div>
                        <button type="submit" class="btn-sm">Opslaan</button>
                    </form>
                </details>
            </div>`;
        }

        // Add group form
        html += `<form class="add-group-form form-row" data-trainer-id="${trainer.id}" style="margin-top:8px">
            <input type="text" name="name" placeholder="Nieuwe groep (bijv. Maandag 15:30-16:30)" required>
            <button type="submit" class="btn-sm">Groep toevoegen</button>
        </form>`;

        html += '</div></div>';
    }

    return html;
}

// --- Routing ---
async function navigate(hash) {
    const app = document.getElementById('app');
    hash = hash || location.hash.replace(/^#/, '');

    if (!DATA && hash !== 'login') {
        app.innerHTML = '<p>Laden...</p>';
        await fetchData();
    }

    renderNav();

    if (hash === 'login') {
        app.innerHTML = renderLogin();
        bindLogin();
    } else if (hash === 'overview') {
        app.innerHTML = renderOverview();
    } else if (hash === 'admin') {
        app.innerHTML = renderAdmin();
        bindAdmin();
    } else if (hash.startsWith('group/')) {
        const [, trainerId, groupId] = hash.split('/');
        app.innerHTML = renderGroup(trainerId, groupId);
        bindAttendance(trainerId, groupId);
    } else if (hash.startsWith('trainer/')) {
        const trainerId = hash.split('/')[1];
        // Show trainer's groups for admin view
        const src = ADMIN_DATA || DATA;
        const trainer = src?.trainers?.find(t => t.id === trainerId);
        if (trainer) {
            let html = `<a href="#" class="back-link">&larr; Terug</a><h1>${esc(trainer.name)}</h1>`;
            for (const group of trainer.groups) {
                const stats = calcGroupStats(group);
                html += `<a href="#group/${trainerId}/${group.id}" class="card card-link">
                    <h3>${esc(group.name)}</h3>
                    <p>${group.players.length} spelers, ${stats.totalSessions} lessen, ${stats.avgAttendance}% gem.</p>
                    <div class="overview-bar"><div class="overview-bar-fill" style="width:${stats.avgAttendance}%;background:${barColor(stats.avgAttendance)}"></div></div>
                </a>`;
            }
            app.innerHTML = html;
        } else {
            app.innerHTML = '<p>Trainer niet gevonden.</p>';
        }
    } else {
        app.innerHTML = renderHome();
    }
}

// --- Event Binding ---
function bindLogin() {
    document.getElementById('login-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const code = document.getElementById('login-code').value.trim();
        const errEl = document.getElementById('login-error');
        errEl.style.display = 'none';
        const result = await apiLogin(code);
        if (result.ok) {
            setAuth({ code, role: result.role, trainer_id: result.trainer_id, trainer_name: result.trainer_name });
            if (result.data) ADMIN_DATA = result.data;
            if (result.trainer) TRAINER_DATA = result.trainer;
            location.hash = '';
        } else {
            errEl.textContent = result.error || 'Onjuiste code';
            errEl.style.display = 'block';
        }
    });
}

let saveTimeout = null;
function bindAttendance(trainerId, groupId) {
    document.querySelectorAll('.att-grid input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
            const date = cb.dataset.date;
            const checkboxes = document.querySelectorAll(`.att-grid input[data-date="${date}"]`);
            const presentPlayers = [];
            checkboxes.forEach(c => { if (c.checked) presentPlayers.push(c.dataset.player); });

            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Opslaan...';
            statusEl.className = 'save-status saving';

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await apiPost('/attendance', { trainer_id: trainerId, group_id: groupId, date, present_players: presentPlayers });

                // Update local data
                await fetchData();
                if (isAdmin()) {
                    const r = await apiLogin(getAuth().code);
                    if (r.data) ADMIN_DATA = r.data;
                } else if (getTrainerId()) {
                    const r = await apiLogin(getAuth().code);
                    if (r.trainer) TRAINER_DATA = r.trainer;
                }

                statusEl.textContent = 'Opgeslagen';
                statusEl.className = 'save-status saved';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            }, 300);
        });
    });
}

function bindAdmin() {
    document.getElementById('add-trainer-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const name = e.target.querySelector('input[name="name"]').value.trim();
        if (!name) return;
        const result = await apiPost('/admin/trainer', { action: 'add', name });
        if (result.data) ADMIN_DATA = result.data;
        await fetchData();
        navigate('admin');
    });

    document.querySelectorAll('.delete-trainer-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (!confirm('Trainer verwijderen?')) return;
            const result = await apiPost('/admin/trainer', { action: 'delete', trainer_id: btn.dataset.trainerId });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('admin');
        });
    });

    document.querySelectorAll('.add-group-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const name = form.querySelector('input[name="name"]').value.trim();
            if (!name) return;
            const result = await apiPost('/admin/group', { action: 'add', trainer_id: form.dataset.trainerId, name });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('admin');
        });
    });

    document.querySelectorAll('.delete-group-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            if (!confirm('Groep verwijderen?')) return;
            const result = await apiPost('/admin/group', { action: 'delete', trainer_id: btn.dataset.trainerId, group_id: btn.dataset.groupId });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('admin');
        });
    });

    document.querySelectorAll('.edit-players-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const text = form.querySelector('textarea[name="players"]').value;
            const players = text.split('\n').map(p => p.trim()).filter(Boolean);
            const result = await apiPost('/admin/players', { trainer_id: form.dataset.trainerId, group_id: form.dataset.groupId, players });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('admin');
        });
    });

    document.querySelectorAll('.edit-dates-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const datesText = form.querySelector('textarea[name="dates"]').value;
            const cancelledText = form.querySelector('textarea[name="cancelled"]').value;
            const dates = datesText.split('\n').map(d => d.trim()).filter(Boolean);
            const cancelled = cancelledText.split('\n').map(d => d.trim()).filter(Boolean);
            const result = await apiPost('/admin/dates', { trainer_id: form.dataset.trainerId, group_id: form.dataset.groupId, dates, cancelled });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('admin');
        });
    });
}

// --- Init ---
window.addEventListener('hashchange', () => navigate());
window.addEventListener('load', async () => {
    const auth = getAuth();
    if (auth?.role === 'admin') {
        const r = await apiLogin(auth.code);
        if (r.ok && r.data) ADMIN_DATA = r.data;
    } else if (auth?.role === 'trainer') {
        const r = await apiLogin(auth.code);
        if (r.ok && r.trainer) TRAINER_DATA = r.trainer;
    }
    navigate();
});
</script>
</body>
</html>
