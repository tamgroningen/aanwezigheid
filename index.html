<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAM Presentielijst TR3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="#" class="nav-brand"><img src="logo.webp" alt="TAM" class="nav-logo">Presentielijst TR3</a>
        <div class="nav-right" id="nav-auth"></div>
    </nav>
    <main id="app"></main>

<script>
const SYNC_URL = 'https://aanwezigheid-sync.tam-floris.workers.dev';
let DATA = null;
let ADMIN_DATA = null;
let TRAINER_DATA = null;

// --- Auth ---
function getAuth() { const r = localStorage.getItem('aanwezigheid_auth'); return r ? JSON.parse(r) : null; }
function setAuth(a) { localStorage.setItem('aanwezigheid_auth', JSON.stringify(a)); }
function clearAuth() { localStorage.removeItem('aanwezigheid_auth'); ADMIN_DATA = null; TRAINER_DATA = null; }
function isAdmin() { return getAuth()?.role === 'admin'; }
function getTrainerId() { return getAuth()?.role === 'trainer' ? getAuth().trainer_id : null; }

// --- API ---
async function fetchData() { const r = await fetch(SYNC_URL + '/data'); DATA = await r.json(); return DATA; }

async function apiLogin(code) {
    const r = await fetch(SYNC_URL + '/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code }),
    });
    return r.json();
}

async function apiPost(path, body) {
    const auth = getAuth();
    const r = await fetch(SYNC_URL + path, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code: auth.code, ...body }),
    });
    return r.json();
}

// --- Helpers ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function getDivisor(groupName) {
    const n = groupName.toLowerCase();
    const is16 = [
        n => n.includes('maandag') && n.includes('speelsterkte 5'),
        n => n.includes('dinsdag') && n.includes('speelsterkte 4'),
        n => n.includes('dinsdag') && n.includes('selectie'),
        n => n.includes('dinsdag') && n.includes('speelsterkte 5'),
        n => n.includes('dinsdag') && n.includes('speelsterkte 7'),
        n => n.includes('woensdag') && n.includes('speelsterkte 6'),
        n => n.includes('woensdag') && n.includes('speelsterkte 4'),
        n => n.includes('donderdag') && n.includes('selectie'),
        n => n.includes('vrijdag') && (n.includes('speelsterkte 7') || n.includes('speelsterkte 8')),
        n => n.includes('vrijdag') && n.includes('selectie'),
    ];
    return is16.some(fn => fn(n)) ? 16 : 8;
}

function pctClass(pct) {
    if (pct < 50) return 'pct-red';
    if (pct < 75) return 'pct-yellow';
    return 'pct-green';
}

function barColor(pct) {
    if (pct < 50) return 'var(--red)';
    if (pct < 75) return 'var(--yellow)';
    return 'var(--green)';
}

function formatDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}

const DAY_NAMES = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

function generateWeeklyDates(dayOfWeek, startDate, endDate) {
    // dayOfWeek: 1=Monday, 7=Sunday (ISO)
    const dates = [];
    const jsDow = dayOfWeek % 7; // convert to JS: 0=Sun, 1=Mon, ...
    const start = new Date(startDate + 'T00:00:00');
    const end = new Date(endDate + 'T00:00:00');
    const current = new Date(start);
    // Move to first matching day
    while (current.getDay() !== jsDow && current <= end) {
        current.setDate(current.getDate() + 1);
    }
    while (current <= end) {
        const y = current.getFullYear();
        const m = String(current.getMonth() + 1).padStart(2, '0');
        const d = String(current.getDate()).padStart(2, '0');
        dates.push(`${y}-${m}-${d}`);
        current.setDate(current.getDate() + 7);
    }
    return dates;
}

function calcGroupStats(group) {
    const today = new Date().toISOString().slice(0, 10);
    const activeDates = group.dates.filter(d => !(group.cancelled || []).includes(d) && d <= today);
    const totalSessions = activeDates.length;
    const playerStats = group.players.map(player => {
        let count = 0;
        let excusedCount = 0;
        for (const d of activeDates) {
            if ((group.attendance?.[d] || []).includes(player)) count++;
            else if ((group.excused?.[d] || []).includes(player)) excusedCount++;
        }
        const effectiveSessions = totalSessions - excusedCount;
        const pct = effectiveSessions > 0 ? Math.round((count / effectiveSessions) * 100) : 0;
        return { player, count, totalSessions, excusedCount, pct };
    });
    // Use totalPresent (incl. subs) per date when available, otherwise count from checklist
    let avgAttendance = 0;
    if (totalSessions > 0 && group.players.length > 0) {
        let presentSum = 0;
        for (const d of activeDates) {
            const tp = group.totalPresent?.[d];
            presentSum += tp != null ? tp : (group.attendance?.[d] || []).length;
        }
        avgAttendance = Math.round((presentSum / (totalSessions * Math.min(getDivisor(group.name), group.players.length))) * 100);
    }
    return { playerStats, totalSessions, avgAttendance };
}

// --- Rendering ---
function renderNav() {
    const el = document.getElementById('nav-auth');
    const auth = getAuth();
    if (isAdmin()) {
        el.innerHTML = `<span class="nav-role">Trainingsleider</span>
            <a href="#" class="nav-link" id="logout-btn">Uitloggen</a>`;
    } else if (auth?.role === 'trainer') {
        el.innerHTML = `<span class="nav-role">${esc(auth.trainer_name)}</span>
            <a href="#" class="nav-link" id="logout-btn">Uitloggen</a>`;
    } else {
        el.innerHTML = '';
    }
    document.getElementById('logout-btn')?.addEventListener('click', e => { e.preventDefault(); clearAuth(); navigate(''); });
}

function renderLogin() {
    return `<div class="login-center"><div class="login-card">
        <h1>TAM Presentielijst TR3</h1>
        <p class="login-hint">Voer je trainerscode of admincode in</p>
        <form id="login-form">
            <input type="password" id="login-code" placeholder="Code" autofocus required>
            <p class="error" id="login-error" style="display:none"></p>
            <button type="submit">Inloggen</button>
        </form>
    </div></div>`;
}

function renderHome() {
    if (!DATA) return '<p>Laden...</p>';

    // Trainer view: only their groups
    if (getTrainerId()) {
        const trainerId = getTrainerId();
        const src = TRAINER_DATA || DATA?.trainers?.find(t => t.id === trainerId);
        if (!src) return '<p>Trainer niet gevonden.</p>';
        const trainer = src.groups ? src : { groups: [] };
        let html = `<h1>Mijn groepen</h1>`;
        if (trainer.groups.length === 0) {
            return html + '<p class="empty">Nog geen groepen toegewezen. Neem contact op met de trainingsleider.</p>';
        }
        for (const group of trainer.groups) {
            const stats = calcGroupStats(group);
            html += `<a href="#group/${trainerId}/${group.id}" class="card card-link">
                <h3>${esc(group.name)}</h3>
                <p>${group.players.length} spelers, ${stats.totalSessions} lessen, ${stats.avgAttendance}% gem. aanwezigheid</p>
                <div class="overview-bar"><div class="overview-bar-fill" style="width:${stats.avgAttendance}%;background:${barColor(stats.avgAttendance)}"></div></div>
            </a>`;
        }
        return html;
    }

    // Admin view: all trainers with inline edit controls
    const src = isAdmin() && ADMIN_DATA ? ADMIN_DATA : DATA;

    // Calculate total club average (using totalPresent-aware group averages)
    let totalPctSum = 0, totalPctCount = 0;
    const trainerAvgs = {};
    for (const trainer of src.trainers) {
        let tSum = 0, tCount = 0;
        for (const group of trainer.groups) {
            const stats = calcGroupStats(group);
            if (stats.totalSessions > 0) { tSum += stats.avgAttendance; tCount++; }
        }
        trainerAvgs[trainer.id] = tCount > 0 ? Math.round(tSum / tCount) : 0;
        totalPctSum += tSum;
        totalPctCount += tCount;
    }
    const clubAvg = totalPctCount > 0 ? Math.round(totalPctSum / totalPctCount) : 0;

    let html = `<h1>Overzicht Aanwezigheid</h1>
        <div class="club-avg card" style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                <div>
                    <strong>Totaal clubgemiddelde</strong>
                    <span class="pct ${pctClass(clubAvg)}" style="margin-left:8px;font-size:1rem">${clubAvg}%</span>
                </div>
                <button class="btn-sm" id="export-btn">Exporteer naar spreadsheet</button>
            </div>
            <div class="overview-bar" style="margin-top:8px"><div class="overview-bar-fill" style="width:${clubAvg}%;background:${barColor(clubAvg)}"></div></div>
        </div>`;

    if (src.trainers.length === 0) {
        html += '<p class="empty">Nog geen trainers toegevoegd.</p>';
    }

    html += `<div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
        <input type="text" id="search-field" placeholder="Zoek trainer, dag, groep..." style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius);font-size:0.9rem">
        ${isAdmin() ? '<button class="btn-sm btn-muted" id="toggle-delete-btn">Verwijdermodus</button>' : ''}
    </div>`;

    if (isAdmin()) {
        html += `<details style="margin-bottom:16px">
            <summary style="cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--blue)">+ Trainer toevoegen</summary>
            <form id="add-trainer-form" class="form-row" style="margin-top:8px">
                <input type="text" name="name" placeholder="Naam nieuwe trainer" required>
                <button type="submit">Toevoegen</button>
            </form>
        </details>`;
    }

    for (const trainer of src.trainers) {
        const trainerSearch = trainer.name + ' ' + trainer.groups.map(g => g.name).join(' ');
        html += `<div class="card trainer-card" data-search="${esc(trainerSearch.toLowerCase())}">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                <div>
                    <h3 style="display:inline">${esc(trainer.name)}</h3>
                    <span class="pct ${pctClass(trainerAvgs[trainer.id])}" style="margin-left:8px;font-size:0.85rem">${trainerAvgs[trainer.id]}% gem.</span>
                    ${isAdmin() && trainer.code ? `<span class="trainer-code" style="margin-left:8px">Code: ${esc(trainer.code)}</span>` : ''}
                </div>
                ${isAdmin() ? `<button class="btn-sm btn-danger delete-btn delete-trainer-btn" data-trainer-id="${trainer.id}">Verwijderen</button>` : ''}
            </div>`;

        // Groups
        html += '<div style="margin-top:12px">';
        if (trainer.groups.length === 0) {
            html += '<p class="empty">Geen groepen</p>';
        }
        for (const group of trainer.groups) {
            const stats = calcGroupStats(group);
            html += `<div style="padding:8px 0;border-top:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                    <a href="#group/${trainer.id}/${group.id}" style="color:var(--blue);font-weight:600">${esc(group.name)}</a>
                    ${isAdmin() ? `<button class="btn-sm btn-danger delete-btn delete-group-btn" data-trainer-id="${trainer.id}" data-group-id="${group.id}">X</button>` : ''}
                </div>
                <div style="font-size:0.85rem;color:var(--muted)">${group.players.length} spelers, ${stats.totalSessions} lessen</div>
                <div class="overview-bar"><div class="overview-bar-fill" style="width:${stats.avgAttendance}%;background:${barColor(stats.avgAttendance)}"></div></div>
                <span class="pct ${pctClass(stats.avgAttendance)}" style="font-size:0.8rem">${stats.avgAttendance}% gem. aanwezigheid</span>`;

            if (isAdmin()) {
                html += `
                <details class="edit-players-detail" style="margin-top:4px">
                    <summary style="cursor:pointer;font-size:0.85rem;color:var(--blue)">Spelers bewerken</summary>
                    <form class="edit-players-form" data-trainer-id="${trainer.id}" data-group-id="${group.id}" style="margin-top:4px">
                        <div class="form-row">
                            <textarea name="players" placeholder="Eén speler per regel">${esc(group.players.join('\n'))}</textarea>
                        </div>
                        <button type="submit" class="btn-sm">Opslaan</button>
                    </form>
                </details>
`;
            }

            html += '</div>';
        }

        if (isAdmin()) {
            html += `<details class="add-group-section" style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
                <summary style="cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--blue)">+ Nieuwe groep</summary>
                <form class="add-group-form" data-trainer-id="${trainer.id}" style="margin-top:8px">
                    <div class="form-row">
                        <select name="day" required>
                            <option value="">Dag</option>
                            ${['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'].map(d =>
                                `<option value="${d}">${d}</option>`
                            ).join('')}
                        </select>
                        <input type="time" name="start_time" required>
                        <input type="time" name="end_time" required>
                    </div>
                    <div class="form-row">
                        <input type="number" name="speelsterkte" placeholder="Speelsterkte (optioneel)" min="1" max="12">
                        <label style="display:flex;align-items:center;gap:4px;font-size:0.9rem"><input type="checkbox" name="selectie"> Selectie</label>
                    </div>
                    <div class="form-row">
                        <input type="date" name="start_date" required>
                        <input type="date" name="end_date" required>
                    </div>
                    <button type="submit" class="btn-sm">Groep toevoegen</button>
                </form>
            </details>`;
        }

        html += '</div></div>';
    }

    html += '<h2><a href="#overview" style="color:var(--blue)">Volledig overzicht per speler &rarr;</a></h2>';
    return html;
}

function renderOverview() {
    if (!DATA) return '<p>Laden...</p>';
    const src = isAdmin() && ADMIN_DATA ? ADMIN_DATA : DATA;
    let html = '<a href="#" class="back-link">&larr; Terug</a><h1>Volledig Overzicht</h1>';

    for (const trainer of src.trainers) {
        for (const group of trainer.groups) {
            const stats = calcGroupStats(group);
            html += `<div class="overview-group">
                <h3>${esc(group.name)}</h3>
                <div class="trainer-name">Trainer: ${esc(trainer.name)}</div>
                <div class="table-wrap"><table class="data">
                    <thead><tr><th>Speler</th><th>Aanwezig</th><th>Totaal</th><th>Percentage</th></tr></thead>
                    <tbody>`;
            for (const ps of stats.playerStats) {
                html += `<tr>
                    <td>${esc(ps.player)}</td>
                    <td class="num">${ps.count}</td>
                    <td class="num">${ps.totalSessions}</td>
                    <td class="num ${pctClass(ps.pct)}">${ps.pct}%</td>
                </tr>`;
            }
            html += '</tbody></table></div></div>';
        }
    }
    return html;
}

function renderGroup(trainerId, groupId) {
    let trainer, group;
    if (isAdmin() && ADMIN_DATA) {
        trainer = ADMIN_DATA.trainers.find(t => t.id === trainerId);
    } else if (TRAINER_DATA && TRAINER_DATA.id === trainerId) {
        trainer = TRAINER_DATA;
    } else {
        trainer = DATA?.trainers?.find(t => t.id === trainerId);
    }
    if (!trainer) return '<p>Trainer niet gevonden.</p>';
    group = (trainer.groups || []).find(g => g.id === groupId);
    if (!group) return '<p>Groep niet gevonden.</p>';

    const canEdit = isAdmin() || getTrainerId() === trainerId;
    const backHash = '#';

    let html = `<a href="${backHash}" class="back-link">&larr; Terug</a>
        <h1>${esc(group.name)}<span class="save-status" id="save-status"></span></h1>`;

    if (group.dates.length === 0) {
        html += '<p class="empty">Nog geen lesdagen ingesteld.</p>';
        return html;
    }
    if (group.players.length === 0) {
        html += '<p class="empty">Nog geen spelers in deze groep.</p>';
        return html;
    }

    const cancelled = group.cancelled || [];
    const stats = calcGroupStats(group);

    html += '<div class="att-grid"><table><thead><tr><th class="player-name">Speler</th>';
    for (const d of group.dates) {
        const isCancelled = cancelled.includes(d);
        html += `<th class="${isCancelled ? 'cancelled' : ''}">${formatDate(d)}</th>`;
    }
    html += '<th>Totaal</th><th>%</th></tr></thead><tbody>';

    // Cancel row (trainer + admin)
    if (canEdit) {
        html += '<tr class="cancel-row"><td class="player-name" style="font-size:0.75rem;color:var(--muted)">Vervallen?</td>';
        for (const d of group.dates) {
            const isCancelled = cancelled.includes(d);
            html += `<td class="${isCancelled ? 'cancelled' : ''}"><input type="checkbox" class="cancel-cb" data-date="${d}" ${isCancelled ? 'checked' : ''}></td>`;
        }
        html += '<td></td><td></td></tr>';
    }

    for (const ps of stats.playerStats) {
        html += `<tr><td class="player-name">${esc(ps.player)}</td>`;
        for (const d of group.dates) {
            const isCancelled = cancelled.includes(d);
            const present = (group.attendance?.[d] || []).includes(ps.player);
            const excused = (group.excused?.[d] || []).includes(ps.player);
            if (isCancelled) {
                html += '<td class="cancelled"></td>';
            } else if (canEdit && isAdmin()) {
                const selClass = present ? 'val-present' : (excused ? 'val-excused' : 'val-absent');
                html += `<td><select class="att-select ${selClass}" data-player="${esc(ps.player)}" data-date="${d}">
                    <option value="">Afwezig</option>
                    <option value="present"${present ? ' selected' : ''}>Aanwezig</option>
                    <option value="excused"${excused ? ' selected' : ''}>Geoorloofd</option>
                </select></td>`;
            } else if (canEdit) {
                html += `<td><input type="checkbox" data-player="${esc(ps.player)}" data-date="${d}" ${present ? 'checked' : ''}></td>`;
            } else {
                html += `<td class="num ${present ? 'val-present' : ''}">${present ? '✓' : ''}</td>`;
            }
        }
        html += `<td class="num total">${ps.count}</td>`;
        html += `<td class="num pct ${pctClass(ps.pct)}">${ps.pct}%</td></tr>`;
    }

    // Totals row
    html += '<tr style="font-weight:700"><td>Totaal</td>';
    for (const d of group.dates) {
        const isCancelled = cancelled.includes(d);
        if (isCancelled) {
            html += '<td class="cancelled"></td>';
        } else {
            const count = (group.attendance?.[d] || []).length;
            html += `<td class="num">${count}</td>`;
        }
    }
    html += '<td></td><td></td></tr>';

    // Total present incl. subs row
    html += '<tr style="font-weight:700"><td style="font-size:0.75rem">Totaal (incl. invallers)</td>';
    for (const d of group.dates) {
        const isCancelled = cancelled.includes(d);
        if (isCancelled) {
            html += '<td class="cancelled"></td>';
        } else {
            const val = group.totalPresent?.[d];
            if (canEdit) {
                html += `<td><input type="number" min="0" class="total-present-input" data-date="${d}" value="${val != null ? val : ''}" style="width:3em;text-align:center"></td>`;
            } else {
                html += `<td class="num">${val != null ? val : ''}</td>`;
            }
        }
    }
    html += '<td></td><td></td></tr>';

    html += '</tbody></table></div>';
    return html;
}


// --- Routing ---
async function navigate(hash) {
    const app = document.getElementById('app');
    hash = hash || location.hash.replace(/^#/, '');

    if (!DATA && hash !== 'login' && getAuth()) {
        app.innerHTML = '<p>Laden...</p>';
        await fetchData();
    }

    renderNav();

    if (!getAuth() && hash !== 'login') {
        location.hash = 'login';
        return;
    }

    if (hash === 'login') {
        app.innerHTML = renderLogin();
        bindLogin();
    } else if (hash === 'overview') {
        app.innerHTML = renderOverview();
    } else if (hash === 'admin') {
        location.hash = '';
        return;
    } else if (hash.startsWith('group/')) {
        const [, trainerId, groupId] = hash.split('/');
        app.innerHTML = renderGroup(trainerId, groupId);
        bindAttendance(trainerId, groupId);
    } else {
        app.innerHTML = renderHome();
        bindSearch();
        if (isAdmin()) bindAdmin();
    }
}

// --- Event Binding ---
function bindLogin() {
    document.getElementById('login-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const code = document.getElementById('login-code').value.trim();
        const errEl = document.getElementById('login-error');
        errEl.style.display = 'none';
        const result = await apiLogin(code);
        if (result.ok) {
            setAuth({ code, role: result.role, trainer_id: result.trainer_id, trainer_name: result.trainer_name });
            if (result.data) ADMIN_DATA = result.data;
            if (result.trainer) TRAINER_DATA = result.trainer;
            location.hash = '';
        } else {
            errEl.textContent = result.error || 'Onjuiste code';
            errEl.style.display = 'block';
        }
    });
}

let saveTimeout = null;
function bindAttendance(trainerId, groupId) {
    // Admin: 3-keuze dropdown (Afwezig / Aanwezig / Geoorloofd)
    document.querySelectorAll('.att-select').forEach(sel => {
        sel.addEventListener('change', () => {
            sel.className = `att-select ${sel.value === 'present' ? 'val-present' : sel.value === 'excused' ? 'val-excused' : 'val-absent'}`;

            const date = sel.dataset.date;
            const selects = document.querySelectorAll(`.att-select[data-date="${date}"]`);
            const presentPlayers = [];
            const excusedPlayers = [];
            selects.forEach(s => {
                if (s.value === 'present') presentPlayers.push(s.dataset.player);
                else if (s.value === 'excused') excusedPlayers.push(s.dataset.player);
            });

            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Opslaan...';
            statusEl.className = 'save-status saving';

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await apiPost('/attendance', { trainer_id: trainerId, group_id: groupId, date, present_players: presentPlayers });
                await apiPost('/excused', { trainer_id: trainerId, group_id: groupId, date, excused_players: excusedPlayers });

                await fetchData();
                const r = await apiLogin(getAuth().code);
                if (r.data) ADMIN_DATA = r.data;

                statusEl.textContent = 'Opgeslagen';
                statusEl.className = 'save-status saved';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            }, 300);
        });
    });

    // Trainer: checkbox (Afwezig / Aanwezig)
    document.querySelectorAll('.att-grid input[type="checkbox"]:not(.cancel-cb)').forEach(cb => {
        cb.addEventListener('change', () => {
            const date = cb.dataset.date;
            const checkboxes = document.querySelectorAll(`.att-grid input[type="checkbox"][data-date="${date}"]`);
            const presentPlayers = [];
            checkboxes.forEach(c => { if (c.checked && c.dataset.player) presentPlayers.push(c.dataset.player); });

            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Opslaan...';
            statusEl.className = 'save-status saving';

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await apiPost('/attendance', { trainer_id: trainerId, group_id: groupId, date, present_players: presentPlayers });

                await fetchData();
                const r = await apiLogin(getAuth().code);
                if (r.trainer) TRAINER_DATA = r.trainer;

                statusEl.textContent = 'Opgeslagen';
                statusEl.className = 'save-status saved';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            }, 300);
        });
    });

    // Total present (incl. subs) inputs
    let totalPresentTimeout = null;
    document.querySelectorAll('.total-present-input').forEach(input => {
        input.addEventListener('change', () => {
            const date = input.dataset.date;
            const total = input.value === '' ? null : parseInt(input.value, 10);

            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Opslaan...';
            statusEl.className = 'save-status saving';

            clearTimeout(totalPresentTimeout);
            totalPresentTimeout = setTimeout(async () => {
                await apiPost('/total-present', { trainer_id: trainerId, group_id: groupId, date, total });

                await fetchData();
                if (isAdmin()) {
                    const r = await apiLogin(getAuth().code);
                    if (r.data) ADMIN_DATA = r.data;
                } else if (getTrainerId()) {
                    const r = await apiLogin(getAuth().code);
                    if (r.trainer) TRAINER_DATA = r.trainer;
                }

                statusEl.textContent = 'Opgeslagen';
                statusEl.className = 'save-status saved';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            }, 300);
        });
    });

    // Cancel date toggles
    document.querySelectorAll('.cancel-cb').forEach(cb => {
        cb.addEventListener('change', async () => {
            const date = cb.dataset.date;
            const cancel = cb.checked;

            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Opslaan...';
            statusEl.className = 'save-status saving';

            await apiPost('/cancel', { trainer_id: trainerId, group_id: groupId, date, cancel });

            await fetchData();
            if (isAdmin()) {
                const r = await apiLogin(getAuth().code);
                if (r.data) ADMIN_DATA = r.data;
            } else if (getTrainerId()) {
                const r = await apiLogin(getAuth().code);
                if (r.trainer) TRAINER_DATA = r.trainer;
            }

            statusEl.textContent = 'Opgeslagen';
            statusEl.className = 'save-status saved';
            setTimeout(() => navigate(), 500);
        });
    });
}

function exportToCSV() {
    const src = isAdmin() && ADMIN_DATA ? ADMIN_DATA : DATA;
    if (!src) return;

    let csv = '\uFEFF'; // BOM for Excel UTF-8
    let clubPctSum = 0, clubPctCount = 0;

    for (const trainer of src.trainers) {
        let trainerPctSum = 0, trainerPctCount = 0;

        for (const group of trainer.groups) {
            const cancelled = group.cancelled || [];
            const today = new Date().toISOString().slice(0, 10);
            const activeDates = group.dates.filter(d => !cancelled.includes(d) && d <= today);

            // Header
            csv += `\n${trainer.name} - ${group.name}\n`;
            csv += `Speler;${group.dates.map(d => {
                const label = formatDate(d);
                return cancelled.includes(d) ? label + ' (vervallen)' : label;
            }).join(';')};Aanwezig;Totaal;Percentage\n`;

            // Player rows
            for (const player of group.players) {
                let count = 0;
                let excusedCount = 0;
                const cells = group.dates.map(d => {
                    if (cancelled.includes(d)) return '';
                    const present = (group.attendance?.[d] || []).includes(player);
                    const excused = (group.excused?.[d] || []).includes(player);
                    if (present) count++;
                    else if (excused) excusedCount++;
                    return present ? 'x' : '';
                });
                const total = activeDates.length;
                const effectiveSessions = total - excusedCount;
                const pct = effectiveSessions > 0 ? Math.round((count / effectiveSessions) * 100) : 0;
                csv += `${player};${cells.join(';')};${count};${total};${pct}%\n`;
            }

            // Totals row
            const totals = group.dates.map(d => {
                if (cancelled.includes(d)) return '';
                return (group.attendance?.[d] || []).length;
            });
            csv += `Totaal;${totals.join(';')};;;\n`;

            // Totals incl. subs row
            const totalsInclSubs = group.dates.map(d => {
                if (cancelled.includes(d)) return '';
                const val = group.totalPresent?.[d];
                return val != null ? val : '';
            });
            csv += `Totaal (incl. invallers);${totalsInclSubs.join(';')};;;\n`;

            // Group average (using totalPresent when available)
            let groupAvg = 0;
            if (activeDates.length > 0 && group.players.length > 0) {
                let presentSum = 0;
                for (const d of activeDates) {
                    const tp = group.totalPresent?.[d];
                    presentSum += tp != null ? tp : (group.attendance?.[d] || []).length;
                }
                groupAvg = Math.round((presentSum / (activeDates.length * Math.min(getDivisor(group.name), group.players.length))) * 100);
            }
            csv += `Groepsgemiddelde;${group.dates.map(() => '').join(';')};;;${groupAvg}%\n`;
            if (activeDates.length > 0) { trainerPctSum += groupAvg; trainerPctCount++; }
        }

        // Trainer average
        const trainerAvg = trainerPctCount > 0 ? Math.round(trainerPctSum / trainerPctCount) : 0;
        csv += `\nGemiddelde ${trainer.name};;;;${trainerAvg}%\n`;
        clubPctSum += trainerPctSum;
        clubPctCount += trainerPctCount;
    }

    // Club average
    const clubAvg = clubPctCount > 0 ? Math.round(clubPctSum / clubPctCount) : 0;
    csv += `\nClubgemiddelde;;;;${clubAvg}%\n`;

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `aanwezigheid_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function bindSearch() {
    document.getElementById('search-field')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.trainer-card').forEach(card => {
            const text = card.dataset.search || '';
            card.style.display = (!q || text.includes(q)) ? '' : 'none';
        });
    });
}

function bindAdmin() {
    // Export button
    document.getElementById('export-btn')?.addEventListener('click', exportToCSV);

    // Toggle delete mode
    document.getElementById('toggle-delete-btn')?.addEventListener('click', () => {
        document.body.classList.toggle('delete-mode');
    });

    // Add trainer
    document.getElementById('add-trainer-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const name = e.target.querySelector('input[name="name"]').value.trim();
        if (!name) return;
        const result = await apiPost('/admin/trainer', { action: 'add', name });
        if (result.data) ADMIN_DATA = result.data;
        await fetchData();
        navigate('');
    });

    // Delete trainer
    document.querySelectorAll('.delete-trainer-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const input = prompt('Typ "verwijder" om deze trainer en al zijn groepen te verwijderen:');
            if (input?.toLowerCase() !== 'verwijder') return;
            const result = await apiPost('/admin/trainer', { action: 'delete', trainer_id: btn.dataset.trainerId });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('');
        });
    });

    // Add group (with day, time, date range → auto-generate dates)
    document.querySelectorAll('.add-group-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const day = form.querySelector('select[name="day"]').value;
            const startTime = form.querySelector('input[name="start_time"]').value;
            const endTime = form.querySelector('input[name="end_time"]').value;
            const startDate = form.querySelector('input[name="start_date"]').value;
            const endDate = form.querySelector('input[name="end_date"]').value;
            if (!day || !startTime || !endTime || !startDate || !endDate) return;

            const speelsterkte = form.querySelector('input[name="speelsterkte"]').value.trim();
            const selectie = form.querySelector('input[name="selectie"]').checked;
            let name = `${day} ${startTime}-${endTime}`;
            const tags = [];
            if (speelsterkte) tags.push(`Speelsterkte ${speelsterkte}`);
            if (selectie) tags.push('Selectie');
            if (tags.length) name += ` ${tags.join(' ')}`;
            const dayIndex = ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'].indexOf(day) + 1;
            const dates = generateWeeklyDates(dayIndex, startDate, endDate);

            // Create group
            const result = await apiPost('/admin/group', { action: 'add', trainer_id: form.dataset.trainerId, name });
            if (result.data) {
                ADMIN_DATA = result.data;
                // Find the newly created group and set dates
                const trainer = ADMIN_DATA.trainers.find(t => t.id === form.dataset.trainerId);
                const newGroup = trainer?.groups[trainer.groups.length - 1];
                if (newGroup && dates.length > 0) {
                    const r2 = await apiPost('/admin/dates', { trainer_id: form.dataset.trainerId, group_id: newGroup.id, dates, cancelled: [] });
                    if (r2.data) ADMIN_DATA = r2.data;
                }
            }
            await fetchData();
            navigate('');
        });
    });

    // Delete group
    document.querySelectorAll('.delete-group-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const input = prompt('Typ "verwijder" om deze groep en alle aanwezigheidsdata te verwijderen:');
            if (input?.toLowerCase() !== 'verwijder') return;
            const result = await apiPost('/admin/group', { action: 'delete', trainer_id: btn.dataset.trainerId, group_id: btn.dataset.groupId });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('');
        });
    });

    // Edit players
    document.querySelectorAll('.edit-players-form').forEach(form => {
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const text = form.querySelector('textarea[name="players"]').value;
            const players = text.split('\n').map(p => p.trim()).filter(Boolean);
            const result = await apiPost('/admin/players', { trainer_id: form.dataset.trainerId, group_id: form.dataset.groupId, players });
            if (result.data) ADMIN_DATA = result.data;
            await fetchData();
            navigate('');
        });
    });

}

window.addEventListener('hashchange', () => navigate());
window.addEventListener('load', async () => {
    const auth = getAuth();
    if (auth?.role === 'admin') {
        const r = await apiLogin(auth.code);
        if (r.ok && r.data) ADMIN_DATA = r.data;
    } else if (auth?.role === 'trainer') {
        const r = await apiLogin(auth.code);
        if (r.ok && r.trainer) TRAINER_DATA = r.trainer;
    }
    navigate();
});
